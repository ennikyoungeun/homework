<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록</title>
</head>
<body>
    
    <!-- ul:정렬되지않은 목록만들기-->
    <!-- ol:순서가 있는목록만들기 -->
    <!-- li(list item) -->
        <ul>
            <li>아이템1</li>
            <li>아이템2</li>
            <li>아이템3</li>
        </ul>
        
        <ol>
            <li>아침먹기</li>
            <li>점심먹기</li>
            <li>저녁먹기</li>
        </ol>

    <!-- dl 정의용 목록 -->
    <!-- dt(설명의 주체).dd(설명의 내용) -->
        <dl>
            <dt>푸들</dt>
            <dd>푸들은 곱슬털을 가진 강아지의 종류이다.</dd>

            <dt>dl</dt>
            <dd>
            정의용 형식의 목록을 만들어주며 dt와dd태그를 사용한다.
            </dd>

            <dt>dt</dt>
            <dd>dt는 설명할 내용의 주체태그이다</dd>

            <dt>dd</dt>
            <dd>dd는 주체에 대한 자세한 설명을 나타내고 목록형태이다.</dd>
        </dl>

            <!-- 링크태그 <a> 다른문서또는 내부의 다른영역과 연결할때사용 href속성과 꼭함께.-->
            <a href="http://wwww.naver.com" target="_blank">네이버</a>
            <!-- _blank 새창으로 열기 -->

            <!-- img 태그
            src: 내가 추가한 이미지의 경로, alt:이미지이름 -->
            <img src="../../img001" alt="이미지">


        
</body>
</html>

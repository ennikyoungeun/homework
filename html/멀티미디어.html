<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <audio src="오디오파일경로" controls></audio>
    <!-- 오디오 태그는 항상 src속성과 함께사용, controls:오디오컨트롤 패널노출 -->
    <video src="비디오 파일 경로" controls></video>
    <!-- src 속성필수,controls속성을 추가해 컨트롤패널 표시 -->
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption>성적표</caption>
        <tr>
            <th scope="col">구분</th>
            <th scope="col">중간고사</th>
            <th scope="col">기말고사</th>
        </tr>
        <tr>
            <td scope="row">전공</td>
            <td >A+</td>
            <td >B+</td>
        </tr>
        <tr>
            <td scope="row">교양</td>
            <td>C-</td>
            <td>B</td>
        </tr>
    <!-- col 세로줄과 연관이있다 row:가로와연관이있다 -->
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            width: 350px;
            margin: 0 auto;}

        .signup input {
            width: 350px;
            height:40px;
            box-sizing: border-box;
        } 
        .signup div{
            margin-bottom: 15px;
        }
        .title {
            font-size: 35px;
        }

        button{ 
            box-sizing: border-box;
            background-color: blue;
            width: 350px;
            height:40px;
            margin: 10px, auto;
        }

        .SNS {text-decoration: underline;
                text-align: center;}
        
    </style>
</head>
<body>
    <div class="container">
        <p class="title">
            지금 가입 하시면 <br>
            <strong>웰컴쿠폰을 드려요!</strong>
        </p>

        <div class="log">
            <span>로그인</span><span>회원가입</span>
        </div>

        <div class="signup">
            <div>
                <div>이메일</div>
                <input type="text" placeholder="아이디 입력">
            </div>

            <div>
                <div>이름/업체명</div>
                <input type="text" placeholder="2자 이상 20자 이하">
            </div>

            <div>
                <div>비밀번호</div>
                <input type="password" placeholder="영문.숫자.특수문자 조합 6-16자리">
            </div>

            <div>
                <div>비밀번호 확인</div>
                <input type="password" placeholder="비밀번호을 다시 입력해주세요.">
            </div>
        </div>


        <input type="checkbox"><ins>개인정보수집이용안내</ins>및 <ins>약관</ins>에 동의 합니다.
        
        <div>
            <button>회원 가입하기 </button>
        </div>

        <div class="SNS">SNS로 간편하게 가입하기</div>
    </div>
</body>
</html>

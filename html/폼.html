<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼</title>
</head>
<body>
<!-- 폼태그 form , 추가적으로 (action: 폼태그로 구성한 데이터를 전송할 경로)
   (method:어떠한 전송 타입인가 )와 사용 -->
   <form action =""method ="">
     <!-- input태그: -->
     <input type ="text">
     <input type ="password">
     <!-- <input type=""> 속성값자리에 커서 넣고 ctrl+스페이스바누르면 가능한속성값나옴 -->
     <input type ="button">
     <input type ="checkbox">
     <input type ="radio">
     <input type ="date">
     <!-- label태그로 인풋타입에 이름을 만들어준다. -->
   </form >

   <form action =""method ="">
     <!-- label 명시적사용 -->
     <label for ="id">아이디 </label ><input type ="text"id ="id">
     <!-- label 암묵적 사용 -->
     <label >아이디 <input type ="text"></label >
    </form>
    
</body>
</html>

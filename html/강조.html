<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강조</title>
</head>
<body>
    
    <!-- strong, em -->
    <!-- strong 태그는 문장을 강조 ,em태그는 단어를 강조할때 사용(기울어짐) -->
    
    <strong>위험 ! 여기는 <em>절대</em> 들어가지 마시오.</strong>
    <br>
    <!-- <b>위험 ! 여기는 <i>절대</i> 들어가지 마시오.</b> -->
</body>
</html>

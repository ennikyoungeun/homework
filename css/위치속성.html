<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18</title>
    <style>

        body {
            height: 5000px;
        }
        .container {
            background-color: lightgray;
            width: 100%;
            padding: 1rem;
            margin: 150px;
            position: relative;
        }
        .box {
            width: 100px;
            height:100px 
        }
        .red {
            background-color: red;
            position: absolute;
            top:0 ;
            left: 0;
            
        }
        .green {
            background-color: green;
            position: fixed;
            right: 100px;
            bottom: 50px; 
        }
        .blue {
            background-color: blue;
            position: relative;
            left: 200px
        }
        .pu{
            background-color: purple;
            position: sticky;
            top: 0;
            
        }
    </style>
    
</head>
<body>
    <div class="container">
        <div class="box red"></div>
        <div class="box green"></div>
        <div class="box blue"></div>
        <div class="box pu"></div>
    </div>
</body>
</html>
    <!--position: ;위치속성
    :position: static; (기본적으로 적용되어있는값html 흐름에 따라배치해라)
    position: fixed; (좌표속성에 의해 요소배치->해당위치에 고정,
                스크롤이 있어도 그자리에 고정)
    position: relative; (기존의 위치유지-죄표속성을 따라이동)
    position: sticky; (평상시에는 static;처럼 보이지만 스크롤시 정해진 좌표위치에 
                이동되면 fixed;처럼 고정되어보임 )
    position: absolute; (절대적인 위치-흐름에서 벗어남
                적용한 요소는 무조건 떠있는 모습을 보여 다음요소가 겹쳐 보일수있음.)
                부모요소 position: relative;지정시 기준값은 부모요소
    z-index: 겹쳐있는 요소를 더 앞으로 나와보이게 조정-->

    <!-- float 속성 -정렬
    float: none;
            float: left; 왼쪽정렬
            float: right; 오른쪽 정렬
    #float 속성은 absolute;처럼 떠서 다른요소가 위치를 인지하지못함
    같은 float:;값을 입력한 요소들은 서로 인지가능.
    float사용시엔 부모요소에 overflow:;적용

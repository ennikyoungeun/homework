<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .inner{
            font-size: 32px; /*기본사이즈 -16px*/
        }
         p{
            font-size: 1em; 
         /*em-부모의 폰트크기의 배수
         rem- 최상위 html요소의 폰트크기에 따라
         80% - 비율 (16px X 0.8 =?) */
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <p>lorem</p>
        </div>
    </div>

</body>
</html>

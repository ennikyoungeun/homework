<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16</title>

    <style>
        .block-1 {
            margin-top: 50px;
            margin-bottom: 100px;
            border: 1px solid red; 
            /* border-width: 1px;
            border-style: solid;
            border-color: red;*/
            padding: 10px;
        }

        .block-2 {
            border: 1px solid red;
            width: 100px;
            height: 100px;
            box-sizing: border-box;
            display: inline;

        }
        .inline-1 {
            margin: 100px;
        }
    </style>
</head>
<body>
    <p class="block-1">block-1</p>
    <p class="block-1">block-1</p>
    <span class="inline-1">inline-1</span>
    <span class="inline-2">inline-2</span>
</body>
</html>
<!-- margin-외부여백 :특정방향에만 적용도 가능 (margin-<top,left,bottom,right>)
       기본 스타일 sheet에 기본으로 16px 지정되어있음. 사용자지정이 더 우선이라 변경됨
margin: ;하나의 값만 지정하면 4면 모두 동일하게 적용,
                        두개의 값은 상하1좌우2 적용 
                        세개의 값은 순차적으로 위,오른쪽(왼쪽은 오른쪽과 같음),아래
margin 겹침현상:똑같은 레벨의 1아래 50, 2위에 200 적용시
                겹쳤을때 더큰 magin영역을 적용
inline 요소는 margin 지정시 top과 bottom영역지정불가 -->

<!-- border: 테두리 (테두리 굵기, 굵기종류, 굵기색깔) -->
<!-- padding :내부영역 ,margin영역과 같은 방향으로 지정, 겹침현상X
content : content에 사이즈 지정시 테두리가 플러스됨 (ex.content 100*100 ->102*102)
        content 사이즈에만  영향을 주고 싶을때, box-sizing:사용-border-box로 속성값 변경지정
display: block; 블록적용된 다음요소는 줄바꿈되어 나타남

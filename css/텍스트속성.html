<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15</title>

    <style>

        h1 {
            font-family: dotum, "바탕", "times new Roman", serif;
            /*웹페이지 사용자의 글꼴이 지원되는거야만 함
            웹폰트나 제너리폰트(글꼴의 포괄적인 유형) 사용 */
            /* serif(글꼴유형)- 지원되지 않은 글꼴의 경우 유형으로 보려달라고 하는것 */
            /* 나열된 순서대로 글꼴적용 시도 ex)dotum체가 없으면 바탕체적용 */
            /* 글꼴 이름에 공백이 있을경우 와 한글체 ""따옴표 사용, */
            font-size: 32px; /* rem, em, px*/
            font-weight:normal ; /*굵기지정,100~900 백단위로 사용 ,*/
            font-variant: small-caps ; /*영문텍스트 한정, 크기가 작은 대문자로 변경 */
            color: red; /*글자색변경*/
            text-align: ; /*텍스트의 정렬 left(=start),right(=end),center, justify(양쪽정렬)*/ 
        }

        h2 {
            font-size: 32px;
            text-decoration: overline; /*글씨위에 줄*/
            /*글자꾸미기 /none:적용안함(a태그는 자동으로 밑줄이 있어 없애고 싶을때 사용),
            line-throgh :취소선 ,underline: 밑줄 */
            letter-spacing: 16px; /*자간*/
        }
        h3{
            text-align: justify;
        }
        h4 {
            line-height: 2; /*행간*/
        }
    </style>
</head>
<body>
    <h1>abc</h1>
    <h2>abc</h2>
    <h3>Lorem ipsum dolor sit amet consectetur adipisicing elit.
        Soluta delectus dolore nobis, labore dolorem suscipit esse perspiciatis illum
         perferendis vero voluptate pariatur iure impedit rem eum illo nisi numquam 
         praesentium!</h3>
    <h4>h4</h4>
    <h5>h5</h5>
    <h6>h6</h6>
</body>
</html>
